<script>
    let productosCount = 0;
    const inputTasa = document.getElementById('tasa');

    // --- MEMORIA PARA LA TASA ---
    window.onload = function() {
        const guardada = localStorage.getItem('tasaNiah');
        // Actualizado a 633 por defecto según tu tasa Binance
        inputTasa.value = guardada ? guardada : 633; 
        agregarProducto();
    };

    inputTasa.addEventListener('input', () => {
        localStorage.setItem('tasaNiah', inputTasa.value);
    });

    function agregarProducto() {
        productosCount++;
        const div = document.createElement('div');
        div.className = 'producto-card';
        div.id = `prod-${productosCount}`;
        div.innerHTML = `
            <button class="btn-remove" onclick="eliminarProducto(${productosCount})">✕</button>
            <input type="text" class="p-nombre" placeholder="Nombre del Producto">
            <textarea class="p-desc" rows="2" placeholder="Talla, Color o Detalles"></textarea>
            <div class="row">
                <input type="number" class="p-cant" placeholder="Cant" value="1" min="1">
                <input type="number" class="p-precio" placeholder="Precio $" step="0.01">
                <input type="number" class="p-envio" placeholder="Envío $" step="0.01">
            </div>
        `;
        document.getElementById('productos-lista').appendChild(div);
    }

    function eliminarProducto(id) {
        if(document.querySelectorAll('.producto-card').length > 1) {
            document.getElementById(`prod-${id}`).remove();
        }
    }

    function generarFactura() {
        const tasa = parseFloat(inputTasa.value) || 0;
        const aplicarComision = document.getElementById('check-comision').checked;
        const aplicarDescuento = document.getElementById('check-descuento').checked;
        
        let sumaProductosOriginal = 0;
        let sumaProductosConDescuento = 0;
        let sumaEnvios = 0;
        let itemsHTML = '';

        const cards = document.querySelectorAll('.producto-card');
        if(cards.length === 0) return alert("Agrega al menos un producto");

        cards.forEach(card => {
            const nombre = card.querySelector('.p-nombre').value || "Producto";
            const desc = card.querySelector('.p-desc').value;
            const cant = parseFloat(card.querySelector('.p-cant').value) || 0;
            const precioBase = parseFloat(card.querySelector('.p-precio').value) || 0;
            const envio = parseFloat(card.querySelector('.p-envio').value) || 0;

            // Lógica corregida: El descuento del 10% va directo al precio del producto
            let precioUnitarioFactura = precioBase;
            if(aplicarDescuento) {
                precioUnitarioFactura = precioBase * 0.90;
            }

            const subtotalItem = (precioUnitarioFactura * cant);
            sumaProductosConDescuento += subtotalItem;
            sumaProductosOriginal += (precioBase * cant);
            sumaEnvios += envio;

            itemsHTML += `
                <tr>
                    <td><strong>${nombre}</strong><br><small>${desc}</small></td>
                    <td>${cant}</td>
                    <td>$${precioUnitarioFactura.toFixed(2)}</td>
                    <td>$${envio.toFixed(2)}</td>
                    <td>$${(subtotalItem + envio).toFixed(2)}</td>
                </tr>
            `;
        });

        // Comisión del 29% (Interna pero con etiqueta "Comisión")
        const montoComision = aplicarComision ? (sumaProductosOriginal * 0.29) : 0;
        
        // Suma Total Cruda
        let totalCrudo = sumaProductosConDescuento + sumaEnvios + montoComision;

        // REDONDEO A TU FAVOR: Sube al siguiente 0.05
        // Ejemplo: Si da 12.11 -> Sube a 12.15
        let totalUSD = Math.ceil(totalCrudo * 20) / 20;

        // Llenar Datos del Cliente
        document.getElementById('f-cliente').innerText = `${document.getElementById('c-nombre').value} ${document.getElementById('c-apellido').value}`;
        document.getElementById('f-ref').innerText = document.getElementById('c-referencia').value || "N/A";
        document.getElementById('f-fecha').innerText = new Date().toLocaleDateString();
        document.getElementById('f-items').innerHTML = itemsHTML;
        
        // Llenar Desglose (Visualización para el cliente)
        document.getElementById('d-prod').innerText = `$${sumaProductosConDescuento.toFixed(2)}`;
        document.getElementById('d-envio').innerText = `$${sumaEnvios.toFixed(2)}`;
        document.getElementById('d-comision').innerText = `$${montoComision.toFixed(2)}`;
        document.getElementById('row-comision').style.display = aplicarComision ? 'flex' : 'none';

        // Ocultamos la fila de descuento porque ya va restado en el precio del producto
        // para que la suma cuadre perfecto visualmente
        document.getElementById('row-descuento').style.display = 'none';

        document.getElementById('f-tasa').innerText = tasa;
        document.getElementById('total-usd').innerText = totalUSD.toFixed(2);
        
        // Total en Bolívares con tu Tasa Binance
        document.getElementById('total-bs').innerText = (totalUSD * tasa).toLocaleString('es-VE', {minimumFractionDigits: 2});

        // Cambiar Vistas
        document.getElementById('admin-view').style.display = 'none';
        document.getElementById('factura-final').style.display = 'block';
        document.getElementById('btn-regresar').style.display = 'block';
        
        window.print();
    }

    function regresar() {
        document.getElementById('admin-view').style.display = 'block';
        document.getElementById('factura-final').style.display = 'none';
        document.getElementById('btn-regresar').style.display = 'none';
    }
</script>
